<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rathe Arsenal</title>

    <!--
      Synchronous theme initialisation — runs before React hydrates to
      prevent flash-of-wrong-theme. Reads localStorage['rathe-arsenal:theme'],
      whitelists against ['dark','light'] BEFORE writing to dataset.theme,
      then defaults to 'dark' for absent or unknown values.
      The whitelist check precedes any DOM write — tampered storage can never
      reach the attribute.
    -->
    <script>
      (function () {
        var ALLOWED = ['dark', 'light'];
        var raw = null;
        try {
          raw = localStorage.getItem('rathe-arsenal:theme');
        } catch (_) {
          // localStorage may be blocked (private mode / security policy)
        }
        var theme = ALLOWED.indexOf(raw) !== -1 ? raw : 'dark';
        document.documentElement.dataset.theme = theme;
      })();
    </script>

    <!-- Google Fonts — preconnect for faster handshake -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

    <!-- Google Fonts — Cinzel, Cinzel Decorative, UnifrakturCook, IBM Plex Sans, JetBrains Mono -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cinzel+Decorative:wght@400;700;900&family=UnifrakturCook:wght@700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
