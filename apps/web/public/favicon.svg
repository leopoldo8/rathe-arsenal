<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Rathe Arsenal">
  <!--
    Rathe Arsenal favicon — the fraktur "R" emblem from the deckbox logo mark.
    Brass (#d69e2e) on dark canvas (#0c0d10), framed as a letterpress seal with
    corner diamonds. The "R" is an outlined UnifrakturCook glyph (not a <text>
    element) so it renders identically without loading the web font, which a
    standalone favicon document cannot do. The glyph is sized to fill most of
    the tile and the frame is kept thin so the mark stays legible at 16px.
  -->
  <defs>
    <radialGradient id="ra-fav-bg" cx="50%" cy="36%" r="78%">
      <stop offset="0%" stop-color="#15171c" />
      <stop offset="100%" stop-color="#0c0d10" />
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="9" fill="url(#ra-fav-bg)" />

  <!-- Brass frame (thin so it does not crowd the mark at small sizes) -->
  <rect x="3.2" y="3.2" width="57.6" height="57.6" rx="7" fill="none" stroke="#d69e2e" stroke-width="1.8" />

  <!-- Corner diamonds (decorative motif from the brand) -->
  <g fill="#d69e2e">
    <path d="M9.5 7.6 L11.4 9.5 L9.5 11.4 L7.6 9.5 Z" />
    <path d="M54.5 7.6 L56.4 9.5 L54.5 11.4 L52.6 9.5 Z" />
    <path d="M9.5 52.6 L11.4 54.5 L9.5 56.4 L7.6 54.5 Z" />
    <path d="M54.5 52.6 L56.4 54.5 L54.5 56.4 L52.6 54.5 Z" />
  </g>

  <!-- Fraktur "R" — outlined UnifrakturCook glyph, centered -->
  <path fill="#d69e2e" d="M25.66 52.50L12.58 47.35Q20.07 40.40 20.07 31.10L20.07 31.10Q20.07 25.78 17.51 19.43L17.51 19.43Q15.85 18.72 12.96 18.72L12.96 18.72Q12.85 18.72 12.74 18.72L12.74 18.72L21.82 11.50Q26.10 14.23 27.52 18.53L27.52 18.53L32.64 11.50Q43.08 16.92 49.46 20.20L49.46 20.20Q42.13 24.07 39.51 25.48L39.51 25.48Q41.50 29.98 43.39 34.49Q45.29 39.01 47.55 43.34L47.55 43.34Q48.67 45.52 51.42 46.07L51.42 46.07Q49.08 47.70 46.72 49.30Q44.36 50.89 42.02 52.50L42.02 52.50Q37.00 39.88 30.84 27.94L30.84 27.94Q32.75 26.71 34.66 25.44Q36.57 24.18 38.50 22.92L38.50 22.92Q34.88 20.85 30.68 18.32L30.68 18.32L28.09 21.86Q28.12 22.30 28.12 22.73L28.12 22.73Q28.12 30.69 20.56 42.69L20.56 42.69L27.82 45.14Q28.44 45.36 29.48 45.36Q30.51 45.36 32.23 44.89L32.23 44.89L25.66 52.50Z" />
</svg>
